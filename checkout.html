<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>চেকআউট - AgroMarket</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">🌾 AgroMarket</a>
      <nav id="auth-links"></nav>
    </div>
  </nav>

  <section class="section section-gray">
    <div class="container">
      <h1 class="section-title">চেকআউট</h1>

      <div class="grid grid-3" style="grid-template-columns: 2fr 1fr; gap: 2rem;">
        <div class="card">
          <h2 class="text-2xl font-bold mb-4">ডেলিভারি তথ্য</h2>
          <form id="checkoutForm">
            <div class="form-group">
              <label>সম্পূর্ণ নাম *</label>
              <input type="text" id="name" class="form-control" required>
            </div>

            <div class="form-group">
              <label>ফোন নম্বর *</label>
              <input type="tel" id="phone" class="form-control" placeholder="01XXXXXXXXX" required>
            </div>

            <div class="form-group">
              <label>সম্পূর্ণ ঠিকানা *</label>
              <textarea id="address" class="form-control" rows="4" required
                placeholder="বাসা/ফ্ল্যাট নং, রাস্তা, এলাকা, জেলা"></textarea>
            </div>

            <div class="form-group">
              <label>পেমেন্ট মাধ্যম *</label>
              <div class="payment-options">
  <label class="payment-option">
    <input type="radio" name="paymentMethod" value="cash" required>
    <span class="payment-label">💵 ক্যাশ অন ডেলিভারি</span>
  </label>
  <label class="payment-option">
    <input type="radio" name="paymentMethod" value="bkash">
    <span class="payment-label">
      <img src="images/bkash.png" style="width:18px;height:18px;vertical-align:middle;border-radius:3px;"> বিকাশ
    </span>
  </label>
  <label class="payment-option">
    <input type="radio" name="paymentMethod" value="nagad">
    <span class="payment-label">
      <img src="images/Nagad.png" style="width:18px;height:18px;vertical-align:middle;border-radius:3px;"> নগদ
    </span>
  </label>
  <label class="payment-option">
    <input type="radio" name="paymentMethod" value="rocket">
    <span class="payment-label">
      <img src="images/rocket.png" style="width:18px;height:18px;vertical-align:middle;border-radius:3px;"> রকেট
    </span>
  </label>
</div>
<input type="hidden" id="paymentMethod" name="paymentMethod">

   <div id="mobilePaymentBox" style="display:none;" class="mobile-payment-box mt-3">
              <label>পেমেন্ট নম্বর *</label>
              <input type="tel" id="mobilePaymentNumber" class="form-control mt-1" placeholder="01XXXXXXXXX">
              <p id="mobilePaymentHint" class="text-sm mt-1"></p>

             </div>
            </div>

            <div class="form-group">
              <label>বিশেষ নির্দেশনা (ঐচ্ছিক)</label>
              <textarea id="notes" class="form-control" rows="3"
                placeholder="যেকোনো বিশেষ নির্দেশনা লিখুন..."></textarea>
            </div>

            <div class="flex gap-2">
              <button type="button" class="btn btn-secondary" onclick="window.location.href='cart.html'">← কার্টে ফিরে
                যান</button>
              <button type="submit" class="btn btn-primary" style="flex: 1;">অর্ডার নিশ্চিত করুন</button>
            </div>
          </form>
        </div>

        <div>
          <div class="card mb-3">
            <h3 class="text-xl font-bold mb-3">অর্ডার সারাংশ</h3>
            <div id="orderItems" class="mb-3">
              <!-- Order items will be loaded here -->
            </div>
            <div class="flex-between mb-2 pb-2" style="border-top: 2px solid var(--border); padding-top: 1rem;">
              <span class="text-lg font-bold">সর্বমোট:</span>
              <span id="orderTotal" class="text-2xl font-bold text-primary">৳0</span>
            </div>
          </div>

          <div class="card" style="background: var(--light-gray);">
            <h4 class="font-bold mb-2">📦 ডেলিভারি তথ্য</h4>
            <p class="text-sm text-gray">ডেলিভারি সময়: ২-৩ কর্মদিবস</p>
            <p class="text-sm text-gray">ডেলিভারি চার্জ: বিনামূল্যে</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 AgroMarket. সর্বস্বত্ব সংরক্ষিত।</p>
  </footer>

  <script src="app.js"></script>
  <script>
  
    
    async function loadCheckout() {
      const user = getCurrentUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const cartData = await getCart();
      if (!cartData.items.length) {
        alert('আপনার কার্ট খালি');
        window.location.href = 'products.html';
        return;
      }

      document.getElementById('name').value = user.name || '';
      //document.getElementById('phone').value = user.phone || '';
      document.getElementById('phone').value =cleanPhoneNumber(user.phone);
      document.getElementById('address').value = user.address || '';

      displayOrderSummary(cartData.items, cartData.grand_total);
    }

    function displayOrderSummary(items, total) {
      const container = document.getElementById('orderItems');
      container.innerHTML = items.map(item => `
                <div class="flex-between mb-2 pb-2" style="border-bottom:1px solid var(--border);">
                    <div style="flex:1;">
                        <div class="font-bold">${item.product_name}</div>
                        <div class="text-sm text-gray">${item.quantity} ${item.unit} × ৳${item.current_price}</div>
                    </div>
                    <div class="font-bold">৳${item.item_total}</div>
                </div>
            `).join('');
      document.getElementById('orderTotal').textContent = formatPrice(total);
    }

    document.getElementById('checkoutForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = this.querySelector('button[type=submit]');
      btn.textContent = 'অপেক্ষা করুন...';
      btn.disabled = true;



     //  Validate phone before placing order
     

      let phone = document.getElementById('phone').value;


phone = phone.replace(/[^0-9]/g, '');

// convert +880 → 0
if (phone.startsWith('880')) {
  phone = '0' + phone.slice(3);
}
if (!/^01[3-9][0-9]{8}$/.test(phone)) {
  alert('সঠিক বাংলাদেশি মোবাইল নম্বর দিন (01XXXXXXXXX)');
  btn.textContent = 'অর্ডার নিশ্চিত করুন';
  btn.disabled = false;
  return;
}
      



      btn.textContent = '⏳ অপেক্ষা করুন...';

      const confirmed = confirm('আপনি কি অর্ডারটি নিশ্চিত করতে চান?');
      if (!confirmed) {
        btn.textContent = 'অর্ডার নিশ্চিত করুন';

        btn.disabled = false;
        return;
      }

      const orderData = {
        shipping_address: document.getElementById('address').value,
        phone: document.getElementById('phone').value,
        //payment_method: document.getElementById('paymentMethod').value,
        payment_method: document.querySelector('input[name="paymentMethod"]:checked')?.value || '',
        notes: document.getElementById('notes').value
      };

      const result = await createOrder(orderData);

      


    if (result.success) {
        const method = orderData.payment_method;
        const mobileNum = document.getElementById('mobilePaymentNumber').value;
        const methodIcons = {
          cash:   '💵',
          bkash:  '<img src="images/bkash.png" style="width:50px;vertical-align:middle;">',
          nagad:  '<img src="images/Nagad.png" style="width:50px;vertical-align:middle;">',
          rocket: '<img src="images/rocket.png" style="width:50px;vertical-align:middle;">'
        };
        const methodNames = {
          cash: 'ক্যাশ অন ডেলিভারি', bkash: 'বিকাশ', nagad: 'নগদ', rocket: 'রকেট'
        };

        // Show success popup
        const popup = document.createElement('div');
        popup.style.cssText = `
          position:fixed; top:0; left:0; width:100%; height:100%;
          background:rgba(0,0,0,0.5); z-index:9999;
          display:flex; align-items:center; justify-content:center;
        `;
        popup.innerHTML = `
          
          <div style="background:white; border-radius:16px; padding:2rem; max-width:400px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
            <h2 style="color:#16a34a; font-size:1.5rem; margin-bottom:0.5rem;">অর্ডার সম্পন্ন!</h2>
            <p style="color:#6b7280; margin-bottom:1.5rem;">আপনার অর্ডার সফলভাবে গৃহীত হয়েছে</p>
            <div style="background:#f0fdf4; border-radius:10px; padding:1rem; margin-bottom:1rem; text-align:left;">
              <div style="margin-bottom:0.5rem;"><strong>অর্ডার নম্বর:</strong> #${result.data.order_id}</div>
              <div style="margin-bottom:0.5rem;"><strong>পেমেন্ট:</strong> ${methodIcons[method]} ${methodNames[method]}</div>
              ${method !== 'cash' && mobileNum ? `<div><strong>পেমেন্ট নম্বর:</strong> ${mobileNum}</div>` : ''}
            </div>
            <p style="font-size:0.875rem; color:#6b7280; margin-bottom:1.5rem;">ডেলিভারি সময়: ২-৩ কর্মদিবস 🚚</p>
            <button onclick="updateNavbar(); window.location.href='consumer-orders.html';" 
              style="background:#16a34a; color:white; border:none; padding:0.75rem 2rem; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; width:100%;">
              আমার অর্ডার দেখুন →
            </button>
          </div>

        `;
        document.body.appendChild(popup);
      } else {
        alert(result.message);
        btn.textContent = 'অর্ডার নিশ্চিত করুন';
        btn.disabled = false;
      }
    });

  

    loadCheckout();
    
    

    document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => radio.addEventListener('change', function () {
      const box = document.getElementById('mobilePaymentBox');
      const hint = document.getElementById('mobilePaymentHint');
      const hints = {
        bkash:  '<img src="images/bkash.png" style="width:50px;vertical-align:middle;"> বিকাশ নম্বরে Send Money করুন',
        nagad:  '<img src="images/Nagad.png" style="width:50px;vertical-align:middle;"> নগদ নম্বরে Send Money করুন',
        rocket: '<img src="images/rocket.png" style="width:50px;vertical-align:middle;"> রকেট নম্বরে Send Money করুন',
        cash:   ''
      };
      if (this.value === 'cash') {
        box.style.display = 'none';
        document.getElementById('mobilePaymentNumber').value = '';
      } else {
        box.style.display = 'block';
        hint.innerHTML = hints[this.value] || '';
        hint.style.color = 'var(--primary-dark)';
        hint.style.marginTop = '6px';
      }
    }));

    </script>
</body>

</html>
