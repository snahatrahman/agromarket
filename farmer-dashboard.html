<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>কৃষক ড্যাশবোর্ড - AgroMarket | Nila</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">🌾 AgroMarket</a>
      <nav id="auth-links"></nav>
    </div>
  </nav>

  <section class="section section-gray">
    <div class="container">
      <div class="flex-between mb-4">
        <h1 class="section-title" style="margin: 0;">কৃষক ড্যাশবোর্ড</h1>
        <a href="farmer-add-product.html" class="btn btn-primary">+ নতুন পণ্য যোগ করুন</a>
      </div>

      <div class="grid grid-4 mb-4">
        <div class="stat-card">
          <div class="number" id="totalProducts">0</div>
          <div class="label">মোট পণ্য</div>
        </div>
        <div class="stat-card">
          <div class="number" id="activeProducts">0</div>
          <div class="label">সক্রিয় পণ্য</div>
        </div>
        <div class="stat-card">
          <div class="number" id="totalOrders">0</div>
          <div class="label">মোট অর্ডার</div>
        </div>
        <div class="stat-card">
          <div class="number" id="totalRevenue">৳0</div>
          <div class="label">মোট আয়</div>
        </div>
      </div>

      <div class="grid grid-2 gap-3">
        <div class="card">
          <div class="flex-between mb-3">
            <h2 class="text-xl font-bold">আমার পণ্য</h2>
            <a href="farmer-products.html" class="btn btn-secondary">সব দেখুন</a>
          </div>
          <div id="recentProducts">
            <!-- Recent products will be loaded here -->
          </div>
        </div>

        <div class="card">
          <h2 class="text-xl font-bold mb-3">সাম্প্রতিক অর্ডার</h2>
          <div id="recentOrders">
            <!-- Recent orders will be loaded here -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 AgroMarket. সর্বস্বত্ব সংরক্ষিত। Developed by team AgroMarket</p>
  </footer>

<script src="app.js"></script>
    <script>
        async function loadDashboard() {
            const user = checkAuth('farmer');
            if (!user) return;

            const [products, orders] = await Promise.all([
                getFarmerProducts(),
                getFarmerOrders()
            ]);

            const activeProducts = products.filter(p => !p.is_expired && p.stock > 0);
            const totalRevenue = orders.reduce((sum, o) => {
                return sum + o.items.reduce((s, i) => s + parseFloat(i.total), 0);
            }, 0);

            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('activeProducts').textContent = activeProducts.length;
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('totalRevenue').textContent = formatPrice(totalRevenue);

            displayRecentProducts(products.slice(0, 5));
            displayRecentOrders(orders.slice(0, 5));
        }

        function displayRecentProducts(products) {
            const container = document.getElementById('recentProducts');
            if (!products.length) {
                container.innerHTML = '<p class="text-gray text-center py-4">কোন পণ্য নেই</p>';
                return;
            }
            container.innerHTML = products.map(p => {
                const freshness = getFreshnessBadge(p.days_old);
                return `
                    <div class="flex-between mb-3 pb-3" style="border-bottom:1px solid var(--border);">
                        <div style="flex:1;">
                            <div class="font-bold">${p.name}</div>
                            <div class="text-sm text-gray">স্টক: ${p.stock} ${p.unit}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="font-bold text-primary">৳${p.current_price}</div>
                            <span class="badge ${freshness.class} text-sm">${freshness.text}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayRecentOrders(orders) {
            const container = document.getElementById('recentOrders');
            if (!orders.length) {
                container.innerHTML = '<p class="text-gray text-center py-4">কোন অর্ডার নেই</p>';
                return;
            }
            container.innerHTML = orders.map(order => {
                const status = getStatusBadge(order.status);
                return `
                    <div class="flex-between mb-3 pb-3" style="border-bottom:1px solid var(--border);">
                        <div style="flex:1;">
                            <div class="font-bold">অর্ডার #${order.id}</div>
                            <div class="text-sm text-gray">${order.user_name}</div>
                            <div class="text-sm text-gray">${formatDate(order.created_at)}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="font-bold text-primary">৳${order.items.reduce((s,i)=>s+parseFloat(i.total),0)}</div>
                            <span class="badge ${status.class} text-sm">${status.text}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
