<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন — AgroMarket</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page { min-height: 100vh; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); display: flex; flex-direction: column; }
        .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { background: white; border-radius: 1.25rem; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; }
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-logo span { font-size: 3rem; }
        .auth-logo h1 { font-size: 1.75rem; font-weight: 800; color: var(--primary); margin-top: 0.5rem; }
        .auth-logo p { color: var(--gray); font-size: 0.9375rem; }
    </style>
</head>
<body class="auth-page">
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">🌾 AgroMarket</a>
        <nav id="auth-links"></nav>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <span>🌾</span>
            <h1>AgroMarket</h1>
            <p>আপনার অ্যাকাউন্টে লগইন করুন</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">ইমেইল ঠিকানা</label>
                <input type="email" class="form-control" id="email" placeholder="example@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">পাসওয়ার্ড</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div id="errorMsg"
               style="color:var(--danger);font-size:0.9rem;margin-bottom:1rem;display:none;"
               aria-live="polite">
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">লগইন করুন</button>
        </form>

        <p class="text-center mt-3" style="color:var(--gray)">
            নতুন ব্যবহারকারী? <a href="register.html" style="color:var(--primary);font-weight:600">বিনামূল্যে রেজিস্টার করুন</a>
        </p>
    </div>
</div>

<script src="app.js"></script>
<script>
    const existingUser = getCurrentUser();
    if (existingUser) {
        const r = { farmer: 'farmer-dashboard.html', admin: 'admin-dashboard.html', consumer: 'consumer-dashboard.html' };
        window.location.href = r[existingUser.role] || 'index.html';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errDiv = document.getElementById('errorMsg');
        btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block"></span> অপেক্ষা করুন...';
        btn.disabled = true;
        errDiv.style.display = 'none';

        const result = await login(document.getElementById('email').value, document.getElementById('password').value);

        if (result.success) {
            showToast('লগইন সফল! স্বাগতম ' + result.data.user.name, 'success');
            const r = { farmer: 'farmer-dashboard.html', admin: 'admin-dashboard.html', consumer: 'consumer-dashboard.html' };
            setTimeout(() => window.location.href = r[result.data.user.role] || 'index.html', 800);
        } else {
            errDiv.textContent = result.message;
            errDiv.style.display = 'block';
            btn.textContent = 'লগইন করুন';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
