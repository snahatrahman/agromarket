<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>কার্ট - AgroMarket</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">🌾 AgroMarket</a>
      <nav id="auth-links"></nav>
    </div>
  </nav>

  <section class="section section-gray">
    <div class="container">
      <h1 class="section-title">আপনার কার্ট</h1>

      <div class="grid  grid-3" style="grid-template-columns: 2fr 1fr; gap: 2rem;">
        <div>
          <div id="cartItems">
            <!-- Cart items will be loaded here -->
          </div>
          <div id="emptyCart" class="card text-center py-5 hidden">
            <h3 class="text-2xl text-gray mb-3">আপনার কার্ট খালি</h3>
            <a href="products.html" class="btn btn-primary">পণ্য দেখুন</a>
          </div>
        </div>

        <div>
          <div class="card" id="cartSummary">
            <h3 class="text-xl font-bold mb-4">অর্ডার সারাংশ</h3>
            <div class="flex-between mb-3 pb-3" style="border-bottom: 1px solid var(--border);">
              <span class="text-gray">পণ্য সংখ্যা:</span>
              <span id="itemCount" class="font-bold">0</span>
            </div>
            <div class="flex-between mb-3 pb-3" style="border-bottom: 1px solid var(--border);">
              <span class="text-gray">মোট দাম:</span>
              <span id="subtotal" class="font-bold">৳0</span>
            </div>
            <div class="flex-between mb-4">
              <span class="text-lg font-bold">সর্বমোট:</span>
              <span id="total" class="text-2xl font-bold text-primary">৳0</span>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="proceedToCheckout()">
              চেকআউট করুন
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 AgroMarket. সর্বস্বত্ব সংরক্ষিত।</p>
  </footer>

<script src="app.js"></script>
    <script>
        async function loadCart() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return; }

            const cartData = await getCart();
            displayCart(cartData.items, cartData.grand_total);
        }

        function displayCart(items, grandTotal) {
            const container = document.getElementById('cartItems');
            const emptyCart = document.getElementById('emptyCart');

            if (!items.length) {
                container.classList.add('hidden');
                emptyCart.classList.remove('hidden');
                document.getElementById('itemCount').textContent = 0;
                document.getElementById('subtotal').textContent = '৳0';
                document.getElementById('total').textContent = '৳0';
                return;
            }

            container.classList.remove('hidden');
            emptyCart.classList.add('hidden');

            container.innerHTML = items.map(item => `
                <div class="card mb-3">
                    <div class="flex gap-3" style="align-items:center;">
                        <img src="${item.image}" alt="${item.product_name}" style="width:100px;height:100px;object-fit:cover;border-radius:0.5rem;" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'">
                        <div style="flex:1;">
                            <h3 class="text-lg font-bold mb-1">${item.product_name}</h3>
                            <p class="text-gray text-sm mb-2">${item.farmer} • ${item.location}</p>
                            <div class="flex gap-2" style="align-items:center;">
                                <span class="text-xl font-bold text-primary">৳${item.current_price}/${item.unit}</span>
                                ${item.discount > 0 ? `<span class="badge badge-danger">${item.discount}% ছাড়</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2" style="align-items:center;">
                            <button class="btn btn-secondary" onclick="changeQty(${item.product_id}, ${item.quantity - 1})">-</button>
                            <span style="min-width:30px;text-align:center;font-weight:bold">${item.quantity}</span>
                            <button class="btn btn-secondary" onclick="changeQty(${item.product_id}, ${item.quantity + 1})">+</button>
                        </div>
                        <div style="text-align:right;min-width:120px;">
                            <div class="text-xl font-bold mb-2">৳${item.item_total}</div>
                            <button class="btn btn-danger" onclick="removeItem(${item.product_id})" style="font-size:0.875rem;padding:0.5rem 1rem;">মুছুন</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const totalItems = items.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('itemCount').textContent = totalItems;
            document.getElementById('subtotal').textContent = formatPrice(grandTotal);
            document.getElementById('total').textContent = formatPrice(grandTotal);
        }

        async function changeQty(productId, qty) {
            if (qty < 0) return;
            await updateCartQuantity(productId, qty);
            loadCart();
            updateNavbar();
        }

        async function removeItem(productId) {
            if (!confirm('এই পণ্যটি কার্ট থেকে মুছে ফেলতে চান?')) return;
            await removeFromCart(productId);
            loadCart();
            updateNavbar();
        }

        function proceedToCheckout() {
            window.location.href = 'checkout.html';
        }

        loadCart();
    </script>
</body>
</html>
